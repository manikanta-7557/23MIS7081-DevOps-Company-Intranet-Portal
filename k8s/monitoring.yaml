apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: monitoring
  template:
    metadata:
      labels:
        app: monitoring
    spec:
      containers:
      - name: graphite
        image: graphiteapp/graphite-statsd:latest
        ports:
        - containerPort: 80
        - containerPort: 2003
      - name: grafana
        image: grafana/grafana:latest
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: graphite-service
spec:
  selector:
    app: monitoring
  ports:
    - name: graphite-ui
      port: 80
    - name: graphite-carbon
      port: 2003
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
spec:
  type: NodePort
  selector:
    app: monitoring
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 32000