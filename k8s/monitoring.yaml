apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: monitoring-stack
  template:
    metadata:
      labels:
        app: monitoring-stack
    spec:
      containers:
      - name: graphite
        image: graphiteapp/graphite-statsd:latest
        ports:
        - containerPort: 80
        - containerPort: 2003
      - name: grafana
        image: grafana/grafana:latest
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: graphite-service
spec:
  selector:
    app: monitoring-stack
  ports:
    - name: carbon
      port: 2003
      targetPort: 2003
    - name: ui
      port: 80
      targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
spec:
  type: NodePort
  selector:
    app: monitoring-stack
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 32000