apiVersion: v1
kind: Service
metadata:
  name: intranet-portal-service
spec:
  type: NodePort
  selector:
    app: intranet-portal
  ports:
    - name: http
      port: 8081
      targetPort: 8081
      nodePort: 30081
    - name: actuator
      port: 9090
      targetPort: 9090
      nodePort: 30090